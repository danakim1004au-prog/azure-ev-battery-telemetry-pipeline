# ============================================================
# EV-Pulse — ML Online Deployment Reproduction File
# ============================================================
# Endpoint    : ev-anomaly-endpoint-6403dedf
# Deployment  : purple2  (final production version)
# Model       : ev-lgbm-inference-artifact  v8
# Algorithm   : LightGBM (BSI-based battery anomaly detection)
# Workspace   : ev-modeling-ML  (koreacentral)
#
# [How to redeploy]
#   1. Create the endpoint first (if it does not exist)
#      az ml online-endpoint create \
#        --name ev-anomaly-endpoint-6403dedf \
#        --workspace-name ev-modeling-ML \
#        --resource-group 4dt_team_1
#
#   2. Deploy from this file
#      az ml online-deployment create \
#        --file infrastructure/ml-deployment-purple2.yml \
#        --workspace-name ev-modeling-ML \
#        --resource-group 4dt_team_1 \
#        --all-traffic
# ============================================================

$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json

name: purple2
endpoint_name: ev-anomaly-endpoint-6403dedf

# Production model — LightGBM BSI anomaly detection, final version
model: azureml:ev-lgbm-inference-artifact:8

instance_type: Standard_DS2_v2
instance_count: 1

request_settings:
  request_timeout_ms: 90000
  max_concurrent_requests_per_instance: 1

liveness_probe:
  initial_delay: 10
  period: 10
  timeout: 2
  success_threshold: 1
  failure_threshold: 30

readiness_probe:
  initial_delay: 10
  period: 10
  timeout: 2
  success_threshold: 1
  failure_threshold: 30
